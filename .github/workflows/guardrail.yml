name: OWASP Guardrail Security Scan

on:
  pull_request:
    branches: [ "main", "master" ]
  push:
    branches: [ "main", "master" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run OWASP Guardrail Scanner
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -n "$GROQ_API_KEY" ]; then
            echo "🤖 AI mode enabled (Groq API key found)"
            npx tsx src/cli.ts scan . --with-ai
          else
            echo "📋 Running without AI (no GROQ_API_KEY secret configured)"
            npx tsx src/cli.ts scan .
          fi

      - name: Upload SARIF report to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: report/guardrail-report.sarif

      - name: Comment PR with Security Score
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request' && always()
        with:
          path: report/pr-comment.md

      - name: Upload HTML & JSON Reports as Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guardrail-security-reports
          path: |
            report/guardrail-report.html
            report/guardrail-report.json
            report/guardrail-report.md
